services:

  postgres:
    image: postgres:16
    container_name: ai-postgres
    restart: unless-stopped

    logging:
      options:
        max-size: "100m"
        max-file: "3"

    env_file:
      - .env

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

    volumes:
      - ./data/postgres:/var/lib/postgresql/data

    networks:
      - backend


  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: ai-openwebui
    restart: unless-stopped

    logging:
      options:
        max-size: "100m"
        max-file: "3"

    env_file:
      - .env

    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      OLLAMA_BASE_URL: http://ollama:11434

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "3000:8080"

    volumes:
      - ./data/openwebui:/app/backend/data

    networks:
      - backend
      - frontend


  ollama:
    image: ollama/ollama
    container_name: ai-ollama
    restart: unless-stopped

    logging:
      options:
        max-size: "100m"
        max-file: "3"

    ports:
      - "11434:11434"

    volumes:
      - ./data/ollama:/root/.ollama

    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3

    networks:
      - backend


  qdrant:
    image: qdrant/qdrant
    container_name: ai-qdrant
    restart: unless-stopped

    logging:
      options:
        max-size: "100m"
        max-file: "3"

    ports:
      - "6333:6333"

    volumes:
      - ./data/qdrant:/qdrant/storage

    networks:
      - backend


  n8n:
    image: n8nio/n8n
    container_name: ai-n8n
    restart: unless-stopped

    logging:
      options:
        max-size: "100m"
        max-file: "3"

    ports:
      - "5678:5678"

    environment:
      TZ: Asia/Jakarta
      N8N_SECURE_COOKIE: "false"

    volumes:
      - ./data/n8n:/home/node/.n8n

    networks:
      - backend
      - frontend


  nginx:
    image: nginx:latest
    container_name: ai-nginx
    restart: unless-stopped

    logging:
      options:
        max-size: "100m"
        max-file: "3"

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

    depends_on:
      - openwebui

    networks:
      - frontend


networks:
  frontend:
  backend:
