services:

  postgres:
    image: postgres:16
    container_name: ai-postgres
    restart: unless-stopped

    logging:
      options:
        max-size: "100m"
        max-file: "3"

    env_file:
      - .env

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

    volumes:
      - ./data/postgres:/var/lib/postgresql/data

    networks:
      - backend


  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: ai-openwebui
    restart: unless-stopped

    logging:
      options:
        max-size: "100m"
        max-file: "3"

    env_file:
      - .env

    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      OLLAMA_BASE_URL: http://ollama:11434

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "3000:8080"

    volumes:
      - ./data/openwebui:/app/backend/data

    networks:
      - backend
      - frontend


  ollama:
    image: ollama/ollama
    container_name: ai-ollama
    restart: unless-stopped

    logging:
      options:
        max-size: "100m"
        max-file: "3"

    ports:
      - "11434:11434"

    volumes:
      - ./data/ollama:/root/.ollama

    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3

    networks:
      - backend


  qdrant:
    image: qdrant/qdrant
    container_name: ai-qdrant
    restart: unless-stopped

    logging:
      options:
        max-size: "100m"
        max-file: "3"

    ports:
      - "6333:6333"

    volumes:
      - ./data/qdrant:/qdrant/storage

    networks:
      - backend


  n8n:
    image: n8nio/n8n
    container_name: ai-n8n
    restart: unless-stopped

    logging:
      options:
        max-size: "100m"
        max-file: "3"

    ports:
      - "5678:5678"

    environment:
      TZ: Asia/Jakarta
      N8N_SECURE_COOKIE: "false"

    volumes:
      - ./data/n8n:/home/node/.n8n

    networks:
      - backend
      - frontend


  nginx:
    image: nginx:latest
    container_name: ai-nginx
    restart: unless-stopped

    logging:
      options:
        max-size: "100m"
        max-file: "3"

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

    depends_on:
      - openwebui

    networks:
      - frontend

  prometheus:
    image: prom/prometheus
    container_name: ai-prometheus
    restart: unless-stopped

    ports:
      - "9090:9090"

    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

    networks:
      - backend


  grafana:
    image: grafana/grafana
    container_name: ai-grafana
    restart: unless-stopped

    ports:
      - "3010:3000"

    volumes:
      - ./data/grafana:/var/lib/grafana

    networks:
      - backend
      - frontend


  node-exporter:
    image: prom/node-exporter
    container_name: ai-node-exporter
    restart: unless-stopped

    ports:
      - "9100:9100"

    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro

    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'

    networks:
      - backend


  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: ai-cadvisor
    restart: unless-stopped

    ports:
      - "8081:8080"

    privileged: true

    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro

    devices:
      - /dev/kmsg

    networks:
      - backend


  loki:
    image: grafana/loki:latest
    container_name: ai-loki
    restart: unless-stopped

    ports:
      - "3100:3100"

    command: -config.file=/etc/loki/local-config.yaml

    volumes:
      - ./logging/loki/loki-config.yml:/etc/loki/local-config.yaml
      - ./data/loki:/loki

    networks:
      - backend


  promtail:
    image: grafana/promtail:latest
    container_name: ai-promtail
    restart: unless-stopped

    volumes:
      - ./logging/promtail/promtail-config.yml:/etc/promtail/config.yml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock

    command: -config.file=/etc/promtail/config.yml

    networks:
      - backend

  vmware-exporter:
    image: pryorda/vmware_exporter
    container_name: ai-vmware-exporter
    restart: unless-stopped

    ports:
      - "9272:9272"

    volumes:
      - ./vmware-exporter/config.yml:/etc/vmware_exporter/config.yml

    command:
      - "-c"
      - "/etc/vmware_exporter/config.yml"

    networks:
      - backend

networks:
  frontend:
  backend:
